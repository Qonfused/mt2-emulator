name: test_iohid entitlement probe

# Probes whether IOHIDUserDeviceCreate succeeds for an unentitled,
# unsigned userspace binary across the macOS versions GitHub Actions
# offers. We expect failure on current macOS (per the kernel source in
# IOHIDResourceUserClient::initWithTask) but want empirical confirmation
# and the exact failure-mode logs across versions, so we can pin down
# when the entitlement gate was added.
#
# The test program lives at .github/test_iohid.c.

on:
  push:
    paths:
      - '.github/test_iohid.c'
      - '.github/workflows/test_iohid_matrix.yml'
  pull_request:
    paths:
      - '.github/test_iohid.c'
      - '.github/workflows/test_iohid_matrix.yml'
  workflow_dispatch:

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14      # Sonoma, Apple Silicon
          - macos-15      # Sequoia, Apple Silicon
          - macos-latest  # whatever GitHub currently aliases (today: macos-15)
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Runner info
        run: |
          echo "=== sw_vers ==="
          sw_vers
          echo
          echo "=== uname ==="
          uname -a
          echo
          echo "=== SIP / boot-args (informational) ==="
          csrutil status || true
          nvram boot-args 2>/dev/null || echo "boot-args: (unset)"
          echo
          echo "=== xcode-select ==="
          xcode-select -p
          clang --version

      - name: Build test_iohid (unsigned, no entitlement)
        working-directory: .github
        run: |
          clang -framework IOKit \
                -framework CoreFoundation \
                test_iohid.c -o test_iohid
          ls -la test_iohid
          echo
          echo "=== codesign status (expect: not signed / adhoc) ==="
          codesign -dv test_iohid 2>&1 || true

      - name: Run test_iohid as normal user
        id: run_user
        working-directory: .github
        continue-on-error: true
        run: |
          set +e
          ./test_iohid
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Run test_iohid as root (sudo)
        id: run_root
        working-directory: .github
        continue-on-error: true
        run: |
          set +e
          sudo ./test_iohid
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Re-sign test_iohid ad-hoc with self-claimed entitlement
        working-directory: .github
        run: |
          cat > entitlements.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.hid.virtual.device</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "=== entitlements.plist ==="
          cat entitlements.plist
          echo
          codesign --sign - --entitlements entitlements.plist --force test_iohid
          echo "=== codesign -dv (post-sign) ==="
          codesign -dv test_iohid 2>&1 || true
          echo
          echo "=== embedded entitlements (what AMFI will see in the signature blob) ==="
          codesign -d --entitlements - test_iohid 2>&1 || true

      - name: Run test_iohid (ad-hoc signed, self-claimed entitlement)
        id: run_signed
        working-directory: .github
        continue-on-error: true
        run: |
          set +e
          ./test_iohid
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Dump system log for test_iohid
        if: always()
        run: |
          echo "=== log show --predicate 'process == \"test_iohid\"' --last 5m ==="
          log show --predicate 'process == "test_iohid"' --last 5m || true
          echo
          echo "=== log show --info --debug eventMessage CONTAINS test_iohid (last 5m) ==="
          log show --info --debug --predicate 'eventMessage CONTAINS "test_iohid"' --last 5m || true
          echo
          echo "=== log show --info --debug eventMessage CONTAINS 'is not entitled' (last 5m) ==="
          log show --info --debug --predicate 'eventMessage CONTAINS "is not entitled"' --last 5m || true
          echo
          echo "=== AMFI messages (last 5m) ==="
          log show --info --debug --predicate 'subsystem == "com.apple.AppleMobileFileIntegrity" OR eventMessage CONTAINS "AMFI"' --last 5m || true

      - name: Summary and overall pass/fail
        if: always()
        run: |
          echo "============================================================"
          echo "macOS:        $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"
          echo "Runner:       ${{ matrix.os }}"
          echo
          echo "Variant 1 — unsigned, normal user:"
          echo "  outcome=${{ steps.run_user.outcome }} exit=${{ steps.run_user.outputs.exit_code }}"
          echo "Variant 2 — unsigned, sudo:"
          echo "  outcome=${{ steps.run_root.outcome }} exit=${{ steps.run_root.outputs.exit_code }}"
          echo "Variant 3 — ad-hoc signed with self-claimed entitlement, normal user:"
          echo "  outcome=${{ steps.run_signed.outcome }} exit=${{ steps.run_signed.outputs.exit_code }}"
          echo "============================================================"

          # Fail the job if any test variant failed. Each test exits non-zero
          # when IOHIDUserDeviceCreate returns NULL (i.e. the entitlement
          # gate is enforced for that variant). The CI status then becomes
          # the regression signal: red = wall is up, green = wall is open.
          fail=0
          if [[ "${{ steps.run_user.outcome }}"   != "success" ]]; then fail=1; fi
          if [[ "${{ steps.run_root.outcome }}"   != "success" ]]; then fail=1; fi
          if [[ "${{ steps.run_signed.outcome }}" != "success" ]]; then fail=1; fi

          if [[ $fail -ne 0 ]]; then
            echo "::error::At least one test_iohid variant failed — IOHIDUserDeviceCreate is gated on this runner"
            exit 1
          fi
          echo "::notice::All test_iohid variants succeeded — IOHIDUserDeviceCreate is open on this runner"
